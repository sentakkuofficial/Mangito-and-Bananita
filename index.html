<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 3 Demo | Mangito & Bananita</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="grid-overlay"></div>

  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">DAY 3 INTERACTIVE DEMO</p>
      <h1>Mangito &amp; Bananita</h1>
      <p class="hero-text">
        Part 1 — The Fall
      </p>
    </section>

    <section class="terminal-card">
      <div class="terminal-topbar">
        <div class="topbar-left">
          <div class="traffic-lights">
            <span class="light red"></span>
            <span class="light amber"></span>
            <span class="light green"></span>
          </div>
          <div class="terminal-badge">STORY MODE</div>
        </div>

        <div class="topbar-right">
          <span class="file-name">main.py</span>
          <span class="status-pill">LIVE DEMO</span>
        </div>
      </div>

      <div class="terminal-body">
        <aside class="line-numbers" id="lineNumbers"></aside>

        <div class="terminal-main">
          <div id="console" class="console-output"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
